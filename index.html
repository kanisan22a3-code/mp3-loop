<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
font-family: sans-serif;
margin: 15px;
background:#f5f5f5;
}
h3 { text-align:center; }

input {
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button {
padding:10px;
margin:4px;
border:none;
border-radius:8px;
background:#333;
color:white;
}

#player { width:1px; height:1px; }

.list {
margin-top:15px;
background:white;
border-radius:10px;
padding:10px;
}

.item {
padding:8px;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
align-items:center;
}

.title {
flex:1;
cursor:pointer;
}

.active {
background:#d0ebff;
}

.del {
color:red;
margin-left:10px;
cursor:pointer;
}
</style>
</head>
<body>

<h3>YouTube音プレイヤー</h3>

<input id="url" placeholder="URL貼るだけ">
<br>

<button onclick="play()">再生</button>
<button onclick="pause()">⏸</button>
<button onclick="cancel()">✖</button>
<button onclick="toggleLoop()" id="loopBtn">ループOFF</button>
<button onclick="saveFav()">★</button>

<br><br>
音量
<input type="range" min="0" max="100" value="50" id="volume">

<div id="player"></div>

<div class="list">
<h4>履歴</h4>
<div id="history"></div>

<h4>お気に入り</h4>
<div id="fav"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let isLoop = false;
let currentUrl = "";

function getId(url){
if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
if(url.includes("youtu.be")) return url.split("/").pop();
return "";
}

function play(urlInput){
const url = urlInput || document.getElementById("url").value;
if(!url) return;

currentUrl = url;

let config = {};

if(url.includes("list=")){
const list = url.split("list=")[1].split("&")[0];
config = {
playerVars:{ listType:'playlist', list:list, autoplay:1 }
};
} else {
const id = getId(url);
config = {
videoId:id,
playerVars:{ autoplay:1 }
};
}

if(player){
if(config.videoId){
player.loadVideoById(config.videoId);
} else {
player.loadPlaylist({list:config.playerVars.list});
}
} else {
player = new YT.Player('player', {
height:'1',
width:'1',
...config,
events:{
onReady:e=>{
e.target.setVolume(document.getElementById("volume").value);
},
onStateChange:e=>{
if(e.data===YT.PlayerState.ENDED && isLoop){
play(currentUrl);
}
}
}
});
}

saveHistory(url);
highlight(url);
}

function pause(){ if(player) player.pauseVideo(); }

function cancel(){
if(player){ player.destroy(); player=null; }
document.getElementById("player").innerHTML="";
}

function toggleLoop(){
isLoop=!isLoop;
document.getElementById("loopBtn").textContent =
isLoop?"ループON":"ループOFF";
}

document.getElementById("volume").addEventListener("input",e=>{
if(player) player.setVolume(e.target.value);
});

// 保存系
function saveHistory(url){
let h = JSON.parse(localStorage.history||"[]");
h.unshift(url);
h=[...new Set(h)].slice(0,10);
localStorage.history=JSON.stringify(h);
render();
}

function saveFav(){
let url=currentUrl;
if(!url) return;
let f=JSON.parse(localStorage.fav||"[]");
f.unshift(url);
f=[...new Set(f)];
localStorage.fav=JSON.stringify(f);
render();
}

function del(type,i){
let list=JSON.parse(localStorage[type]||"[]");
list.splice(i,1);
localStorage[type]=JSON.stringify(list);
render();
}

// 表示
function render(){
let h=JSON.parse(localStorage.history||"[]");
let f=JSON.parse(localStorage.fav||"[]");

document.getElementById("history").innerHTML =
h.map((u,i)=>`<div class="item">
<span class="title" onclick="play('${u}')">${u}</span>
<span class="del" onclick="del('history',${i})">削除</span>
</div>`).join("");

document.getElementById("fav").innerHTML =
f.map((u,i)=>`<div class="item">
<span class="title" onclick="play('${u}')">★ ${u}</span>
<span class="del" onclick="del('fav',${i})">削除</span>
</div>`).join("");
}

function highlight(url){
document.querySelectorAll(".item").forEach(e=>e.classList.remove("active"));
}

render();
</script>

</body>
</html>
